<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Institutional Gold Analytics Dashboard v17.2</title>
    <!-- Library TradingView -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0c0d14; color: #cbd5e1; margin: 0; padding: 12px; }
        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
        .panel { background-color: #131722; padding: 14px; border-radius: 8px; border: 1px solid #2a2e39; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.75rem; color: #787b86; font-weight: bold; text-transform: uppercase; }
        select, input { background-color: #1e222d; border: 1px solid #2a2e39; color: #fff; padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none; }
        button { background: linear-gradient(135deg, #b38f4d, #d4af37); border: none; color: #000; font-weight: bold; cursor: pointer; padding: 12px; width: 100%; border-radius: 6px; font-size: 0.9rem; text-transform: uppercase; margin-top: 5px; }
        .setup-dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        .metric-card { background-color: #131722; border: 1px solid #2a2e39; border-radius: 8px; padding: 14px; display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden; }
        .metric-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: #d4af37; }
        .metric-card.danger::before { background: #ef4444; }
        .metric-card.success::before { background: #10b981; }
        .metric-card.progress-mode::before { background: #06b6d4; }
        .metric-title { font-size: 0.7rem; color: #787b86; font-weight: bold; text-transform: uppercase; }
        .metric-value { font-size: 1.25rem; font-weight: bold; color: #fff; margin-top: 2px; }
        .metric-sub { font-size: 0.75rem; color: #94a3b8; }
        .status-badge { font-size: 0.95rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .badge-waiting { color: #fbbf24; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); }
        .badge-progress { color: #06b6d4; background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.4); }
        .chart-panel { background-color: #131722; border-radius: 8px; border: 1px solid #2a2e39; padding: 10px; position: relative; }
        .chart-label { position: absolute; top: 20px; left: 20px; background: rgba(19, 23, 34, 0.9); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: #d4af37; border: 1px solid #2a2e39; z-index: 10; }
        #interactiveChart { width: 100%; height: 450px; }
        .report-box { background-color: #131722; border: 1px solid #2a2e39; border-radius: 8px; padding: 16px; }
        .terminal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2e39; padding-bottom: 8px; margin-bottom: 14px; font-size: 0.8rem; font-weight: bold; color: #d4af37; }
        .output-text { font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 0.82rem; color: #e2e8f0; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="row">
            <div class="col">
                <label>Mode Filter Sniper</label>
                <select id="tradingMode">
                    <option value="ULTRA">💎 ULTRA CONFLUENCE</option>
                    <option value="M1_CHOCH">⚡ SHORT SCALPER</option>
                </select>
            </div>
            <div class="col">
                <label>Arah Bias Utama</label>
                <select id="arahBias">
                    <option value="BULLISH" selected>📈 ORDER FLOW BULLISH</option>
                    <option value="BEARISH">📉 ORDER FLOW BEARISH</option>
                    <option value="KONFLIK">⚠️ MACRO SIDEWAYS</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>Balance ($)</label>
                <input type="number" id="accountSizeInput" value="10000">
            </div>
            <div class="col">
                <label>Risiko (%)</label>
                <select id="riskPercentInput">
                    <option value="1.0" selected>1.0%</option>
                    <option value="2.0">2.0%</option>
                </select>
            </div>
        </div>
        <button id="btnCalculate">🎯 CALCULATE MATRIX</button>
    </div>

    <div class="setup-dashboard-grid">
        <div class="metric-card" id="cardTracker">
            <div class="metric-title">📡 TRIGGER STATUS</div>
            <div id="executionBadge" class="status-badge badge-waiting">LOADING...</div>
            <div class="metric-sub" id="livePriceMonitor">Live Price: $--</div>
        </div>
        <div class="metric-card" id="cardVerdict">
            <div class="metric-title">🎯 WINRATE VERDICT</div>
            <div class="metric-value" id="valVerdict">-</div>
            <div class="metric-sub" id="valWinrate">Winrate: --</div>
        </div>
        <div class="metric-card" id="cardKeyLevel">
            <div class="metric-title">🏛️ OTE SWEET SPOT (70.5%)</div>
            <div class="metric-value" id="valKeyLevel" style="color: #d4af37;">-</div>
            <div class="metric-sub" id="valKeyDesc">-</div>
        </div>
        <div class="metric-card" id="cardRisk">
            <div class="metric-title">💼 RISK & LOT</div>
            <div class="metric-value" id="valLot">-</div>
            <div class="metric-sub" id="valSlPips">SL: -- Pips</div>
        </div>
    </div>

    <div class="chart-panel">
        <div class="chart-label">TARGET INTERAKTIF XAUUSD</div>
        <div id="interactiveChart"></div>
    </div>

    <div class="report-box">
        <div class="terminal-header">
            <span>🏛️ AI SNIPER PROTOCOL v17.2</span>
            <span style="color: #10b981;" id="syncStatus">🟢 ACTIVE</span>
        </div>
        <div class="output-text" id="terminalOutput">Initializing...</div>
    </div>
</div>

<!-- Memanggil eksternal file JS agar aman dari Jekyll Build -->
<script src="app.js"></script>
</body>
</html>
